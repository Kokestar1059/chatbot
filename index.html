<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- #5: 会話表示（吹き出し・複数メッセージ・送信中状態）。描画は src/ui.js。 -->
      <div id="output"></div>
      <form id="chat-form">
        <input
          id="input"
          type="text"
          autocomplete="off"
          placeholder="メッセージを入力"
        />
        <button id="send" type="submit">送信</button>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
