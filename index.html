<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- #7: 履歴サイドバー（複数会話・New chat・切替）。描画は src/ui.js。 -->
      <aside id="sidebar">
        <button id="new-chat" type="button">+ New chat</button>
        <div id="conversation-list"></div>
      </aside>
      <!-- 右カラム: 既存チャット（#5）。 -->
      <main id="chat">
        <!-- #5: 会話表示（吹き出し・複数メッセージ・送信中状態）。描画は src/ui.js。 -->
        <div id="output"></div>
        <!-- #8: API 失敗時のエラー通知。普段は hidden、main.js が文言を入れて表示。 -->
        <div id="error" role="alert" hidden></div>
        <form id="chat-form">
        <input
          id="input"
          type="text"
          autocomplete="off"
          placeholder="メッセージを入力"
        />
        <button id="send" type="submit">送信</button>
      </form>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
