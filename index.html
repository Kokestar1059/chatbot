<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
  </head>
  <body>
    <div id="app">
      <!-- #4: 履歴なしの最小ループ。吹き出し・複数会話は後続スライス。 -->

        <input
          id="input"
          type="text"
          autocomplete="off"
          placeholder="メッセージを入力"
        />
        <button type="submit">送信</button>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
